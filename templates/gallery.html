<!doctype html><html><head><meta charset="utf-8"><title>{{ agent_name }} - Qalereya</title><meta name="viewport" content="width=device-width, initial-scale=1"><link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}"></head><body><header><a class="back" href="{{ url_for('main.agent_detail', agent_name=agent_name) }}">← Agent səhifəsi</a><div style="font-size:13px;color:#9ca3af;">Son 5 dəqiqəlik qalereya</div></header><div id="gallery" class="gallery-grid"></div><div id="modal"><span id="modal-close">✕</span><img id="modal-img"></div><script>const agent={{ agent_name|tojson }};let offset=0;const limit=60;let isLoading=false;const gallery=document.getElementById("gallery");async function loadMore(){if(isLoading)return;isLoading=true;const res=await fetch(`/api/agent/${encodeURIComponent(agent)}/shots?offset=${offset}&limit=${limit}`);const data=await res.json();if(data.length===0){window.removeEventListener("scroll",scrollHandler);isLoading=false;return;}data.forEach(item=>{const div=document.createElement("div");div.className="shot";div.innerHTML=`<img src="/screens/${item.filename}"><div>${item.created_at}</div>`;div.addEventListener("click",()=>openModal(item.filename));gallery.appendChild(div);});offset+=data.length;isLoading=false;}function scrollHandler(){if(window.innerHeight+window.scrollY>=document.body.offsetHeight-200)loadMore();}window.addEventListener("scroll",scrollHandler);loadMore();const modal=document.getElementById("modal"),modalImg=document.getElementById("modal-img"),modalClose=document.getElementById("modal-close");function openModal(filename){modalImg.src="/screens/"+filename;modal.style.display="flex";}modalClose.addEventListener("click",()=>modal.style.display="none");modal.addEventListener("click",e=>{if(e.target===modal)modal.style.display="none";});</script></body></html>
