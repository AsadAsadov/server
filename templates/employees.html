<!doctype html><html><head><meta charset="utf-8"><title>İşçi paneli - BestHome Monitor</title><meta name="viewport" content="width=device-width, initial-scale=1"><link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}"></head><body><header><a href="{{ url_for('main.dashboard') }}" class="back">← Dashboard</a><div style="font-size:13px;color:#9ca3af;">İşçi paneli</div></header><main><h1>Agentlərə işçi bağlama</h1><table><thead><tr><th>#</th><th>Agent PC</th><th>İşçi adı</th><th>Şöbə</th><th>Vəzifə</th><th>Qeyd</th><th></th></tr></thead><tbody>{% for r in rows %}<tr><form method="POST"><input type="hidden" name="_csrf_token" value="{{ csrf_token() }}"><td>{{ loop.index }}</td><td><input type="text" value="{{ r.agent_name }}" readonly><input type="hidden" name="agent_name" value="{{ r.agent_name }}"></td><td><input name="full_name" value="{{ r.full_name }}"></td><td><input name="department" value="{{ r.department }}"></td><td><input name="role" value="{{ r.role }}"></td><td><textarea name="note">{{ r.note }}</textarea></td><td><button type="submit">Yadda saxla</button></td></form></tr>{% endfor %}</tbody></table></main></body></html>
